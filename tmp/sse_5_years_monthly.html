            };
            tabsDiv.appendChild(btnAll);

            rawData.forEach((trace, index) => {
                const btn = document.createElement('div');
                btn.className = 'etf-block';
                btn.innerText = trace.name.split('(')[0];
                
                btn.onclick = function() {
                    document.querySelectorAll('.etf-block').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const visibilityMask = rawData.map((_, i) => i === index ? true : false);
                    Plotly.update('chart', {visible: visibilityMask}, {title: trace.name + ' 规模走势 (近5年)'});
                };
                tabsDiv.appendChild(btn);
            });
        </script>
    </body>
    </html>
