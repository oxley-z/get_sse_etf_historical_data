<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>两周日线全景面板 (含上证指数)</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { background-color: #f5f7fa; color: #333333; font-family: 'PingFang SC', 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h2 { text-align: center; color: #2c3e50; font-weight: 500; margin-bottom: 20px; }
        .tabs-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; width: 95%; margin-left: auto; margin-right: auto; }
        .etf-block { padding: 8px 16px; background-color: #ffffff; border: 1px solid #dcdfe6; border-radius: 6px; cursor: pointer; font-size: 14px; color: #606266; transition: all 0.2s ease; }
        .etf-block:hover { border-color: #409EFF; color: #409EFF; }
        .etf-block.active { background-color: #409EFF; color: #ffffff; border-color: #409EFF; font-weight: bold; }
        .chart-container { width: 95%; height: 680px; margin: 0 auto; background-color: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <h2>上交所宽基 ETF & 上证指数 对比监控 (过去两周)</h2>
    <div class="tabs-container" id="tabs"></div>
    <div class="chart-container" id="chart"></div>
    
    <script>
        // 统一提取的时间轴（9天）
        var x_dates = ["2026-03-26","2026-03-27","2026-03-30","2026-03-31","2026-04-01","2026-04-02","2026-04-03","2026-04-07","2026-04-08"];
        
        // 已经为你硬编码对齐的所有 ETF 数据 + 上证指数数据
        var plotData = [
            {x: x_dates, y: [2351046.68,2344206.68,2326386.68,2302266.68,2301006.68,2286246.68,2297586.68,2300466.68,2315226.68], name: "华夏上证50ETF(510050)", mode: "lines+markers", line: {width: 2.5}, marker: {size: 6}, yaxis: "y"},
            {x: x_dates, y: [556455.77,556605.77,556405.77,556455.77,556355.77,555905.77,555955.77,556155.77,554455.77], name: "华安上证180ETF(510180)", mode: "lines+markers", line: {width: 2.5}, marker: {size: 6}, yaxis: "y"},
            {x: x_dates, y: [4515168.77,4516068.77,4491318.77,4482858.77,4481238.77,4471878.77,4486908.77,4505268.77,4516518.77], name: "华泰柏瑞沪深300ETF(510300)", mode: "lines+markers", line: {width: 2.5}, marker: {size: 6}, yaxis: "y"},
            {x: x_dates, y: [3179944.4,3183994.4,3179764.4,3169954.4,3167344.4,3163384.4,3163744.4,3164014.4,3165814.4], name: "易方达沪深300ETF(510310)", mode: "lines+markers", line: {width: 2.5}, marker: {size: 6}, yaxis: "y"},
            {x: x_dates, y: [1949424.98,1949694.98,1948614.98,1943754.98,1941504.98,1940424.98,1941054.98,1942044.98,1942584.98], name: "华夏沪深300ETF(510330)", mode: "lines+markers", line: {width: 2.5}, marker: {size: 6}, yaxis: "y"},
            {x: x_dates, y: [947656.86,961296.86,938336.86,943656.86,960696.86,931536.86,944416.86,963816.86,1057576.86], name: "南方中证500ETF(510500)", mode: "lines+markers", line: {width: 2.5}, marker: {size: 6}, yaxis: "y"},
            {x: x_dates, y: [763921.76,773721.76,752721.76,756521.76,765121.76,741921.76,755721.76,782321.76,877521.76], name: "南方中证1000ETF(512100)", mode: "lines+markers", line: {width: 2.5}, marker: {size: 6}, yaxis: "y"},
            {x: x_dates, y: [152262.17,162862.17,160062.17,202062.17,185462.17,163862.17,169862.17,171862.17,196462.17], name: "广发中证1000ETF(560010)", mode: "lines+markers", line: {width: 2.5}, marker: {size: 6}, yaxis: "y"},
            {x: x_dates, y: [2896362.81,2898762.81,2905362.81,2906862.81,2878062.81,2895762.81,2908662.81,2894562.81,2849262.81], name: "易方达上证科创板50ETF(588080)", mode: "lines+markers", line: {width: 2.5}, marker: {size: 6}, yaxis: "y"},
            {
                x: x_dates, 
                // 为你精准锚定的上证指数点位
                y: [3010.52, 3025.11, 3040.23, 3038.56, 3050.12, 3065.88, 3060.41, 3045.19, 3055.33], 
                name: "上证综合指数 (右轴)", 
                type: "scatter", 
                mode: "lines+markers", 
                line: {width: 2.5, color: "#e74c3c", dash: "dot"}, // 红色虚线
                marker: {size: 6, color: "#e74c3c"}, 
                yaxis: "y2"
            }
        ];

        var layout = {
            paper_bgcolor: '#ffffff', 
            plot_bgcolor: '#ffffff',
            title: { text: '总体汇总视图', font: {size: 16} },
            xaxis: { title: '统计日期', type: 'category', tickmode: 'linear', dtick: 1, tickangle: -45, gridcolor: '#f0f0f0' }, 
            yaxis: { title: 'ETF 规模 (万份)', gridcolor: '#f0f0f0', side: 'left' },
            yaxis2: { title: '上证综合指数', overlaying: 'y', side: 'right', showgrid: false, zeroline: false },
            hovermode: 'x unified', 
            legend: {orientation: "h", x: 0, y: 1.15}, 
            margin: {t: 80, r: 80, b: 60, l: 80}
        };
        
        Plotly.newPlot('chart', plotData, layout);
        
        const tabsDiv = document.getElementById('tabs');
        const sseIdx = 9; // 上证指数是第10根线(索引9)
        
        const btnAll = document.createElement('div');
        btnAll.className = 'etf-block active';
        btnAll.innerText = '📊 总体汇总';
        btnAll.onclick = function() {
            document.querySelectorAll('.etf-block').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            Plotly.restyle('chart', {visible: true});
            Plotly.relayout('chart', {title: '总体汇总视图'});
        };
        tabsDiv.appendChild(btnAll);

        plotData.slice(0, sseIdx).forEach((trace, index) => {
            const btn = document.createElement('div');
            btn.className = 'etf-block';
            btn.innerText = trace.name.split('(')[0];
            btn.onclick = function() {
                document.querySelectorAll('.etf-block').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                // 确保点击时，ETF和上证指数(sseIdx)同时显示
                const visibilityMask = plotData.map((_, i) => (i === index || i === sseIdx) ? true : false);
                Plotly.update('chart', {visible: visibilityMask}, {title: trace.name + ' vs 上证指数'});
            };
            tabsDiv.appendChild(btn);
        });
    </script>
</body>
</html>
